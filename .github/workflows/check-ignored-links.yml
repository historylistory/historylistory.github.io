name: Check Ignored Domain Links

on:
  schedule:
    # Runs first Sunday of each month at 8:00 AM UTC
    - cron: "0 8 1-7 * 0"
  workflow_dispatch: # Allow manual runs

permissions:
  issues: write

jobs:
  check-ignored-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract ignored domains from .lycheeignore
        id: domains
        run: |
          # Pull domain patterns (lines with .*), strip to domain names
          grep '/\.\*' .lycheeignore | sed 's|https://||;s|/\.\*||' | sort -u > ignored_domains.txt
          echo "Found ignored domains:"
          cat ignored_domains.txt

      - name: Find URLs on ignored domains in markdown files
        run: |
          # Extract URLs from markdown link syntax: [text](url)
          # Use lookbehind for ( to only get URLs inside markdown links
          > urls_raw.txt
          while IFS= read -r domain; do
            grep -rhoP "(?<=\()https://${domain}[^\)]*" categories/ *.md 2>/dev/null >> urls_raw.txt || true
          done < ignored_domains.txt

          # Clean and deduplicate
          sort -u urls_raw.txt -o urls_to_check.txt
          echo "Found $(wc -l < urls_to_check.txt) unique URLs to check"

      - name: Check URLs with curl
        run: |
          echo "# Ignored Domain Link Check" > report.md
          echo "" >> report.md
          echo "These URLs are on domains excluded from the main link checker." >> report.md
          echo "Checked with curl (handles HTTP/2 fallback)." >> report.md
          echo "" >> report.md

          failures=0
          checked=0

          while IFS= read -r url; do
            [ -z "$url" ] && continue
            checked=$((checked + 1))

            # curl with HTTP/1.1 fallback, follow redirects, 30s timeout
            status=$(curl -o /dev/null -s -w "%{http_code}" \
              --max-time 30 \
              --retry 2 \
              --retry-delay 5 \
              -L \
              -A "Mozilla/5.0 (compatible; link-checker)" \
              "$url" 2>/dev/null || echo "000")

            # Only flag real failures: 404, 410, 000 (connection failed)
            if [ "$status" = "404" ] || [ "$status" = "410" ] || [ "$status" = "000" ]; then
              echo "* \`$status\` — $url" >> report.md
              failures=$((failures + 1))
            fi

            # Rate limit: 1 request per second
            sleep 1
          done < urls_to_check.txt

          echo "" >> report.md
          echo "---" >> report.md
          echo "Checked $checked URLs, found $failures failures." >> report.md

          if [ "$failures" -gt 0 ]; then
            echo "has_failures=true" >> "$GITHUB_ENV"
          else
            echo "has_failures=false" >> "$GITHUB_ENV"
          fi

          cat report.md

      - name: Create or update issue with results
        if: env.has_failures == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "Link Checker: broken links on ignored domains"
        run: |
          # Ensure label exists
          gh label create "link-check" --color "d93f0b" --description "Automated link check results" 2>/dev/null || true
          BODY=$(cat ./report.md)
          # Find existing open issue with this title
          ISSUE=$(gh issue list --state open --search "$TITLE" --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" | head -1)
          if [ -n "$ISSUE" ]; then
            gh issue edit "$ISSUE" --body "$BODY"
            echo "Updated issue #$ISSUE"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "link-check"
            echo "Created new issue"
          fi
