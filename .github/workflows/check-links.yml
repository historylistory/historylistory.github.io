name: Check Links

on:
  schedule:
    # Runs every Sunday at 6:00 AM UTC
    - cron: "0 6 * * 0"
  workflow_dispatch: # Allow manual runs

permissions:
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links in markdown files
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude scheme:mailto
            --exclude-path "index.md"
            --timeout 30
            --max-retries 3
            --accept 200,202,204,301,302,401,402,403,429,503
            "categories/**/*.md"
            "*.md"
          fail: false

      - name: Create or update issue with results
        if: env.lychee_exit_code != 0
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "Link Checker: broken links found"
        run: |
          # Ensure label exists
          gh label create "link-check" --color "d93f0b" --description "Automated link check results" 2>/dev/null || true
          BODY=$(cat ./lychee/out.md)
          # Find existing open issue with this title
          ISSUE=$(gh issue list --state open --search "$TITLE" --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" | head -1)
          if [ -n "$ISSUE" ]; then
            gh issue edit "$ISSUE" --body "$BODY"
            echo "Updated issue #$ISSUE"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "link-check"
            echo "Created new issue"
          fi
