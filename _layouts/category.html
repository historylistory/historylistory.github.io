---
layout: default
---

<div class="category-section">
  <h2>{{ page.title }}</h2>

  <div class="link-grid">
    {% assign subs = site.pages | where: "layout", "subcategory" | where: "category_slug", page.category_slug | sort: "title" %}
    {% for sub in subs %}
      <div class="link-card subcategory-card">
        <a href="{{ sub.url | relative_url }}">
          <div class="card-body">
            <h4>{{ sub.title }}</h4>
          </div>
        </a>
      </div>
    {% endfor %}
  </div>
</div>
